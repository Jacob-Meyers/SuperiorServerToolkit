name: SuperiorServerToolkit
version: '1.0'
main: com.jeyers.sstkit.SupToolkit
api-version: '1.21'
authors: [ Jacob Meyers (TeamJEM) ]
website: https://modrinth.com/user/TeamJEM
permissions:
  all.permission.node:
    description: "Operator Status permission node."
    default: true
  op.permission.node:
    description: "Operator Status permission node."
    default: op
  sstkit.permission.fly:
    description: Allows use of /fly
    default: op
  sstkit.permission.ghost:
    description: Allows use of /ghost
    default: op
  sstkit.permission.heal:
    description: Allows use of /heal
    default: op
commands:
  sstkitcommands:
    description: Outputs all Superior Server Toolkit Commands
    usage: /<command>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  readptransform:
    description: Outputs player position and rotation
    aliases: [readptransform, playertransform]
    usage: /<command> args
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  broadcastmsg:
    description: Broadcast a message to the whole server; &color> = §
    usage: /<command> message
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  kickuntilrestart:
    description: Kick a player until server restarts; @a makes all players kicked, not just online players
    usage: /<command> <player/@a> <custom_message (optional)>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  kickuntilrestartclear:
    description: Clear the list for kickuntillrestart.
    usage: /<command>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  fly:
    description: Toggles flight mode for a player.
    usage: /<command> [player]
    permission: sstkit.permission.fly
    permission-message: "You do not have permission to use this command"
  giveperm:
    description: Give permission for certain Superior Server Toolkit Commands.
    usage: /<command> [player]
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  ghost:
    description: Go into spectator while keeping your position when you do /ghost again.
    usage: /<command>
    permission: sstkit.permission.ghost
    permission-message: "You do not have permission to use this command"
  warpcreate:
    description: Create a location for /warp.
    usage: /<command> <warp_name>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  warpremove:
    description: Remove a location for /warp.
    aliases: [warpremove, warpdelete]
    usage: /<command> <warp_name>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  warplist:
    description: Lists available /warp locations.
    usage: /<command>
    permission: all.permission.node
    permission-message: "You do not have permission to use this command"
  warp:
    description: Warp to a defined location.
    usage: /<command> <warp_name>
    permission: all.permission.node
    permission-message: "You do not have permission to use this command"
  memoryusage:
    description: Outputs the servers memory usage info.
    aliases: [memoryusage, mem]
    usage: /<command>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  cpuusage:
    description: Outputs the servers cpu usage info.
    aliases: [ cpuusage, cpu ]
    usage: /<command>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  heal:
    description: Heals a player's health by a set amount.
    usage: /<command> <player> <amount>
    permission: sstkit.permission.heal
    permission-message: "You do not have permission to use this command"
  list:
    description: Lists the online players.
    usage: /<command>
    permission: all.permission.node
    permission-message: "You do not have permission to use this command"
  invsee:
    description: Shows a specified online players inventory or use endersee for ender chest.
    aliases: [ invsee, endersee ]
    usage: /<command>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  invincible:
    description: Makes yourself or a specified player not take any damage until run again or server restart.
    usage: /<command> <optional_player>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  vpncheck:
    description: Check player if likely using VPN.
    usage: /<command> <player>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"
  tempban:
    description: Temporarily ban a player (IN MINUTES).
    aliases: [ tempban, untempban, pardontempban, tempbanlist ]
    usage: /<command> <player> <time_in_minutes>
    permission: op.permission.node
    permission-message: "You do not have permission to use this command"